<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="field" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7C45C" />
      <stop offset="1" stop-color="#D9981F" />
    </linearGradient>
    <radialGradient id="glow" cx="256" cy="246" r="184" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF8EA" stop-opacity="0.95" />
      <stop offset="0.4" stop-color="#FFE9BE" stop-opacity="0.45" />
      <stop offset="1" stop-color="#FFE9BE" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Warm amber field, full-bleed (so it pops on any wallpaper, light or dark) -->
  <rect width="512" height="512" fill="url(#field)" />

  <!-- Il Sentiero: a path rising to the node that lights up -->
  <path d="M148 374 Q 208 322 256 246" stroke="#FFFFFF" stroke-opacity="0.24" stroke-width="11" stroke-linecap="round" />
  <circle cx="148" cy="374" r="15" fill="#FFFFFF" fill-opacity="0.30" />
  <circle cx="204" cy="320" r="17" fill="#FFFFFF" fill-opacity="0.44" />

  <!-- The lit node: warm light on the field -->
  <circle cx="256" cy="246" r="184" fill="url(#glow)" />
  <circle cx="256" cy="246" r="60" fill="#FFFCF4" />
</svg>
